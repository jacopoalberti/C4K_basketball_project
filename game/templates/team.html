<h1>Team Dashboard</h1>

<hr>

<h2>Create Team</h2>
<input id="teamName" placeholder="Team name" type="text">
<button onclick="createTeam()">Create Team</button>

<hr>

<h2>Player Heatmap (Activity 1)</h2>

<select id="playerSelect" onchange="updatePlayerHeatmap()">
    <option value="">-- Select Player --</option>
    {% for player in players %}
    <option value="{{ player.id }}">{{ player.name }}</option>
    {% endfor %}
</select>

<div class="court">
    <div class="backboard"></div>
    <div class="hoop"></div>
    <div class="key"></div>
    <div class="free-throw-circle"></div>
    <div class="arc"></div>
    <div class="three-left"></div>
    <div class="three-right"></div>

    {% for zone in zones %}
    <button class="zone zone-{{ zone.id}}" data-name="{{ zone.name }}"
            id="pzone-{{ zone.id }}"
            onclick="selectZone({{ zone.id }})">
        {{ zone.name }}
    </button>
    {% endfor %}

</div>

<hr>

<h2>Team Heatmap</h2>

<select id="heatmapTeam" onchange="updateHeatmap()">
    <option value="">-- Select Team --</option>
    {% for team in teams %}
    <option value="{{ team.id }}">{{ team.name }}</option>
    {% endfor %}
</select>

<hr>

<div class="court">
    <div class="backboard"></div>
    <div class="hoop"></div>
    <div class="key"></div>
    <div class="free-throw-circle"></div>
    <div class="arc"></div>
    <div class="three-left"></div>
    <div class="three-right"></div>

    {% for zone in zones %}
    <button class="zone zone-{{ zone.id}}" data-name="{{ zone.name }}"
            id="tzone-{{ zone.id }}"
            onclick="selectZone({{ zone.id }})">
        {{ zone.name }}
    </button>
    {% endfor %}

    <p id="selected-zone-display">
        Selected Zone: None
    </p>
</div>

<div class="result-buttons">
    <button onclick="submitTeamShot(true)" type="button">MAKE</button>
    <button onclick="submitTeamShot(false)" type="button">MISS</button>
</div>

<hr>

<style>
    .court {
        position: relative;
        width: 500px;
        height: 450px;
        margin: 20px auto;
        background: #e8c999;
        border: 4px solid black;
        border-radius: 20px;
        overflow: hidden;
    }

    /* hoop */
    .hoop {
        position: absolute;
        top: 30px;
        left: 50%;
        width: 50px;
        height: 6px;
        background: orange;
        transform: translateX(-50%);
    }

    /* free throw key */
    .key {
        position: absolute;
        top: 0px;
        left: 50%;
        width: 180px;
        height: 250px;
        border: 3px solid black;
        transform: translateX(-50%);
    }

    /* free throw circle */
    .free-throw-circle {
        position: absolute;
        top: 190px;
        left: 50%;
        width: 120px;
        height: 120px;
        border: 3px solid black;
        border-radius: 50%;
        transform: translateX(-50%);
    }

    /* 3 point arc */
    .arc {
        position: absolute;
        top: -80px;
        left: 50%;
        width: 420px;
        height: 420px;
        border: 3px solid black;
        border-radius: 50%;
        transform: translateX(-50%);
        clip-path: inset(50% 0 0 0);
    }

    /* left 3pt line */
    .three-left {
        position: absolute;
        left: 37px;
        top: 0px;
        width: 3px;
        height: 150px;
        background: black;
    }

    /* right 3pt line */
    .three-right {
        position: absolute;
        right: 37px;
        top: 0px;
        width: 3px;
        height: 150px;
        background: black;
    }


    /* zone circles */
    .zone {
        position: absolute;
        width: 65px;
        height: 55px;
        border-radius: 50%;
        background: lightgray;
        border: 2px solid black;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        cursor: pointer;
        user-select: none;
    }

    /* zone position */
    .zone-2 { top: 80px; left: 55px; }
    .zone-1 { top: 80px; left: 50%; transform: translateX(-50%); }
    .zone-3 { top: 80px; right: 55px; }

    .zone-4 { top: 280px; left: 35px; }
    .zone-6 { top: 280px; right: 35px; }

    .zone-5 { top: 350px; left: 50%; transform: translateX(-50%); }

    /* selected zone text */
        #selected-zone-display {
        text-align: left;
        font-size: 25px;
        font-weight: bold;
        margin-top: 400px;
    }

    /* made-miss buttons position */
    .result-buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 15px;
    }


    .result-buttons button {
        padding: 15px 35px;
        font-size: 20px;
        border-radius: 10px;
        cursor: pointer;
    }
</style>

<script>
    function createTeam() {
        const name = document.getElementById("teamName").value.trim();

        if (!name) {
            alert("Enter a team name!");
            return;
        }

        fetch("/create-team/", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: `name=${encodeURIComponent(name)}`
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "ok") {
                alert("Team created!");

                // reload dropdowns so it appears immediately
                location.reload();
            } else {
                alert(data.message);
            }
        })
        .catch(err => {
            console.error(err);
            alert("Error creating team");
        });
    }

    let selectedZone = null;


    function updatePlayerHeatmap() {
        const playerId = document.getElementById("playerSelect").value;
        if (!playerId) {
        document.querySelectorAll("[id^='pzone-']").forEach(z => {
            z.style.backgroundColor = "";
        });
        return;
        }

        fetch(`/stats/?player=${playerId}`)
        .then(res => res.json())
        .then(data => {

            // reset ONLY player zones
            document.querySelectorAll("[id^='pzone-']").forEach(z => {
                z.style.backgroundColor = "";
            });

            data.forEach(zone => {
                const btn = document.getElementById(`pzone-${zone.zone_id}`);
                if (!btn) return;

                let color;
                if (zone.percentage > 70) color = "green";
                else if (zone.percentage > 40) color = "yellow";
                else color = "red";

                btn.style.backgroundColor = color;
            });
        });
    }



    function selectZone(zoneId) {
        selectedZone = zoneId;
        document.getElementById("selected-zone-display").innerText =
            "Selected Zone: " + zoneId;
    }

    function submitTeamShot(made) {
        const teamId = document.getElementById("heatmapTeam").value;

        if (!teamId || !selectedZone) {
            alert("Select team and zone!");
            return;
        }

        if (!teamId) {
        alert("Select a team!");
        return;
        }

        fetch("/team-shot/", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: `team=${teamId}&zone=${selectedZone}&made=${made}`
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "ok") {
                updateTeamHeatmap();
            } else {
                alert(data.message);
            }
        });
    }

    function updateTeamHeatmap() {
        const teamId = document.getElementById("heatmapTeam").value;

        if (!teamId) {
        document.querySelectorAll("[id^='tzone-']").forEach(z => {
            z.style.backgroundColor = "";
        });
        return;
        }

        fetch(`/team-stats/?team=${teamId}`)
        .then(res => res.json())
        .then(data => {

            // reset colors
            document.querySelectorAll("[id^='tzone-']").forEach(z => {
            z.style.backgroundColor = "";
            });

            data.forEach(zone => {
                const btn = document.getElementById(`tzone-${zone.zone_id}`);

                let color;
                if (zone.percentage > 70) color = "green";
                else if (zone.percentage > 40) color = "yellow";
                else color = "red";

                btn.style.backgroundColor = color;
            });
        });
    }
</script>
