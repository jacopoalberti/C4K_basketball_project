<h1 class="main-title">Game Dashboard</h1>

<style>
  .main-title {
    text-align: center;
    font-size: 50px;
  }
</style>

<h3>Select Player</h3>
<select id="player" onchange="updateHeatmap()">
  <option value="">-- Select player --</option>
  {% for player in players %}
    <option value="{{ player.id }}">{{ player.name }}</option>
  {% endfor %}
</select>

<br><br>

<input type="text" id="newPlayerName" placeholder="New player name">
<button type="button" onclick="submitShot(false, true)">Add Player</button>

<hr>

<div class="court">
    <div class="backboard"></div>
    <div class="hoop"></div>
    <div class="key"></div>
    <div class="free-throw-circle"></div>
    <div class="arc"></div>
    <div class="three-left"></div>
    <div class="three-right"></div>

    {% for zone in zones %}
        <button id="zone-{{ zone.id }}" class="zone zone-{{ zone.id}}" onclick="selectZone({{ zone.id }})">
            {{ zone.name }}
        </button>
    {% endfor %}

    <p id="selected-zone-display">
    Selected Zone: None
    </p>
</div>

<div class="result-buttons">
    <button type="button" onclick="submitShot(true)">MAKE</button>
    <button type="button" onclick="submitShot(false)">MISS</button>
</div>

<hr>

<style>
.court {
    position: relative;
    width: 500px;
    height: 450px;
    margin: 20px auto;
    background: #e8c999;
    border: 4px solid black;
    border-radius: 20px;
    overflow: hidden;
}

/* hoop */
.hoop {
    position: absolute;
    top: 30px;
    left: 50%;
    width: 50px;
    height: 6px;
    background: orange;
    transform: translateX(-50%);
}

/* free throw key */
.key {
    position: absolute;
    top: 0px;
    left: 50%;
    width: 180px;
    height: 250px;
    border: 3px solid black;
    transform: translateX(-50%);
}

/* free throw circle */
.free-throw-circle {
    position: absolute;
    top: 190px;
    left: 50%;
    width: 120px;
    height: 120px;
    border: 3px solid black;
    border-radius: 50%;
    transform: translateX(-50%);
}

/* 3 point arc */
.arc {
    position: absolute;
    top: -80px;
    left: 50%;
    width: 420px;
    height: 420px;
    border: 3px solid black;
    border-radius: 50%;
    transform: translateX(-50%);
    clip-path: inset(50% 0 0 0);
}

/* left 3pt line */
.three-left {
    position: absolute;
    left: 37px;
    top: 0px;
    width: 3px;
    height: 150px;
    background: black;
}

/* right 3pt line */
.three-right {
    position: absolute;
    right: 37px;
    top: 0px;
    width: 3px;
    height: 150px;
    background: black;
}


/* zone circles */
.zone {
    position: absolute;
    width: 65px;
    height: 55px;
    border-radius: 50%;
    background: lightgray;
    border: 2px solid black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
}

/* zone position */
.zone-2 { top: 80px; left: 55px; }
.zone-1 { top: 80px; left: 50%; transform: translateX(-50%); }
.zone-3 { top: 80px; right: 55px; }

.zone-4 { top: 280px; left: 35px; }
.zone-6 { top: 280px; right: 35px; }

.zone-5 { top: 350px; left: 50%; transform: translateX(-50%); }

/* selected zone text */
    #selected-zone-display {
    text-align: left;
    font-size: 20px;
    font-weight: bold;
    margin-top: 400px;
}

/* made-miss buttons position */
.result-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 15px;
}

/* made-miss buttons position */
.result-buttons button {
    padding: 15px 35px;
    font-size: 20px;
    border-radius: 10px;
    cursor: pointer;
}
</style>





<script>
let selectedZone = null;

function selectZone(zoneId) {
    selectedZone = zoneId;
    document.getElementById("selected-zone-display").innerText =
        `Selected Zone: ${zoneId}`;
}

function submitShot(made, createPlayerOnly=false) {
    const playerId = document.getElementById("player").value;
    const newPlayerName = document.getElementById("newPlayerName").value.trim();

    if (!playerId && !newPlayerName) {
        alert("Select a player or enter a new player name!");
        return;
    }

    if (!selectedZone && !createPlayerOnly) {
        alert("Select a zone first!");
        return;
    }

    const bodyData = `player=${playerId}&new_player=${encodeURIComponent(newPlayerName)}` +
                     (createPlayerOnly ? "" : `&zone=${selectedZone}&made=${made}`);

    fetch("", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: bodyData
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === "ok") {
            updateHeatmap();
            document.getElementById("newPlayerName").value = "";
        } else {
            alert(data.message);
        }
    })
    .catch(err => {
        console.error("Error:", err);
        alert("An error occurred");
    });
}

function updateHeatmap() {
    const playerId = document.getElementById("player").value;
    if (!playerId) {
        // Clear heatmap if no player selected
        document.querySelectorAll(".zone").forEach(btn => {
            btn.style.backgroundColor = "";
            btn.innerText = btn.dataset.name;  // optional: reset to zone name
        });
        return;
    }
    fetch(`/stats/?player=${playerId}`)
    .then(response => response.json())
    .then(data => {
        data.forEach(zone => {
            const button = document.getElementById(`zone-${zone.zone_id}`);
            if (!button) return;

            const pct = zone.percentage;
            let color;

            if (pct > 70) color = "green";
            else if (pct > 40) color = "yellow";
            else color = "red";

            button.style.backgroundColor = color;
            button.innerText = `${zone.zone_name}\n${pct.toFixed(0)}% | ${zone.points} pts`;
        });
    })
    .catch(err => console.error(err));
}

document.getElementById("player").addEventListener("change", updateHeatmap);

window.onload = function() {
    document.getElementById("player").addEventListener("change", updateHeatmap);
    updateHeatmap();
};
</script>
